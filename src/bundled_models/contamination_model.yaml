# Model card for src/bundled_models/contamination_model.joblib
#
# Consumed at runtime by `src.core.contamination_scoring.ContaminationScorer._load_ml_model`
# after a SHA-256 gate against `CONTAMINATION_MODEL_SHA256` in that module.

model: ExtraTreesRegressor
framework: scikit-learn
# The bundled .joblib payload advertises the model_name string that
# `create_contamination_scorer` surfaces as the
# `estimated_contamination_strategy` column (e.g. `extra_trees_v1`).
model_name: extra_trees
training_profile: sensitive_mode_features
# Decision threshold stored inside the joblib bundle and read by
# ``ContaminationScorer._load_ml_model`` at runtime. This value is the one
# F1-optimized on the real-contig benchmark training data.
# FullSummarizer._contamination_reporting_threshold lifts it to
# ``max(10.0, threshold)`` before using it as the summary display gate,
# so contamination < 10% is still surfaced as ``clean`` in the output
# TSV regardless of this raw threshold.
threshold: 1.5

# --- Training provenance ---------------------------------------------------
# Retrained for v1.4.3 from scratch under sensitive_mode=true (E=1e-5, no
# GA cutoffs) on the real-contig benchmark. The training features come
# from the v1.4.3 pipeline, which includes the multi-HMM dedup fix so
# feature distributions reflect the corrected counts.
training_dataset: benchmarking/contamination/real_contig_benchmark_current
training_script: src/bin/benchmark_real_contig_contamination.py
trained_by: NeLLi Team
trained_at: "2026-04-16"
# Selection: extra_trees chose over random_forest and hist_gbm during
# hyperparameter / candidate cross-validation inside
# `train_and_benchmark`. Model hyperparameters:
#   n_estimators=500, min_samples_leaf=2, random_state=42
# Held-out test metrics (true vs tuned):
#   mae_all = 3.92
#   clean_mean = 0.14  (mean predicted contamination on clean bins)

# --- Integrity gate --------------------------------------------------------
# Expected digest of the bundled .joblib file. Rotate this value via
# `scripts/rotate_contamination_model.py` whenever the model is retrained;
# the code-level constant in `src/core/contamination_scoring.py` must match
# or the pipeline refuses to load the pickle.
sha256: 3ef1dc146ad723842a5aec8bf88020a21ed46699183264e3bb1d5ab33cc1d590
bytes: 1481389

# --- Features --------------------------------------------------------------
# Exact column order expected by .predict(); must match
# CONTAMINATION_MODEL_FEATURES in src/core/contamination_scoring.py.
features:
  - contamination_score_v1
  - contamination_cellular_signal_v1
  - contamination_phage_signal_v1
  - contamination_duplication_signal_v1
  - contamination_viral_mixture_signal_v1
  - contamination_nonviral_hit_fraction_v1
  - order_dup
  - gvog8_dup
  - cellular_unique
  - cellular_total
  - phage_unique
  - phage_total
  - contigs
  - suspicious_bp_fraction_v2
  - suspicious_contig_count_v2
  - estimated_completeness

# --- Notes -----------------------------------------------------------------
notes: >-
  Trained on features generated with sensitive_mode=true (E=1e-5,
  GA/TC/NC cutoffs disabled). Safe to apply under both sensitive and
  non-sensitive runs: the feature distributions overlap because the
  rule-based contamination signals and per-marker counts do not depend
  on the cutoff regime in the ways the model reads them.
