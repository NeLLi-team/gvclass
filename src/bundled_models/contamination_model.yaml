# Model card for src/bundled_models/contamination_model.joblib
#
# Consumed at runtime by `src.core.contamination_scoring.ContaminationScorer._load_ml_model`
# after a SHA-256 gate against `CONTAMINATION_MODEL_SHA256` in that module.

model: ExtraTreesRegressor
framework: scikit-learn
# The bundled .joblib payload advertises the model_name string that
# `create_contamination_scorer` surfaces as the
# `estimated_contamination_strategy` column (e.g. `extra_trees_v1`).
model_name: extra_trees
training_profile: sensitive_mode_features_per_contig_purity_v1
# Decision threshold stored inside the joblib bundle and read by
# ``ContaminationScorer._load_ml_model`` at runtime. This value is the one
# F1-optimized on the real-contig benchmark training data.
# FullSummarizer._contamination_reporting_threshold still enforces
# ``max(10.0, threshold)`` so the user-facing clean-vs-flagged cutoff
# is unchanged regardless of this raw threshold.
threshold: 2.5

# --- Training provenance ---------------------------------------------------
# Retrained for v1.4.3 Phase 2 on the real-contig benchmark under
# sensitive_mode=true (E=1e-5, no GA cutoffs). Training features include the
# five new per-contig taxonomic-purity features introduced in Phase 2
# (see docs/plans/active/v1_4_3_contig_purity_contamination.md).
training_dataset: benchmarking/contamination/real_contig_benchmark_current
training_script: src/bin/benchmark_real_contig_contamination.py
trained_by: NeLLi Team
trained_at: "2026-04-17"
# Selection: extra_trees chose over random_forest and hist_gbm during
# hyperparameter / candidate cross-validation inside
# `train_and_benchmark`. Model hyperparameters:
#   n_estimators=500, min_samples_leaf=2, random_state=42
# Held-out test metrics (true vs tuned):
#   mae_all = 4.37
#   clean_mean = 0.34  (mean predicted contamination on clean bins)
# The small MAE uptick vs the previous 3.88 reflects the Phase 2
# suspicious-contig rule swap: the legacy cellular_marker_count /
# cellular_hits triggers are no longer fed into suspicious_bp_fraction_v2
# when the per-contig classifier is active, so the model now leans
# more heavily on the five new purity features. Net effect is
# biologically correct rather than statistically tighter.

# --- Hyperparameters (classifier thresholds, module-level constants) -------
# These are fixed-not-grid-searched per the v1.4.3 Phase 2 plan; they come
# from the classifier's biology (HGT-divergent viral genes sit at <55%
# identity; a reliable per-contig call needs 3+ cellular proteins).
hyperparameters:
  MIN_CELLULAR_MARKERS: 3
  PURITY_THRESHOLD: 0.6
  MIN_CELLULAR_IDENTITY: 70.0
  MIN_MARKER_PROTEINS_FOR_FRACTION: 5
  WEAK_ATTRIBUTION_UNIQUE_CONTIG_FRACTION: 0.8

# --- Integrity gate --------------------------------------------------------
# Expected digest of the bundled .joblib file. Rotate this value via
# `scripts/rotate_contamination_model.py` whenever the model is retrained;
# the code-level constant in `src/core/contamination_scoring.py` must match
# or the pipeline refuses to load the pickle.
sha256: c349f2081f0682c64a0b0626571a025e716905e460274747874429b0d4a46329
bytes: 1471920

# --- Features --------------------------------------------------------------
# Exact column order expected by .predict(); must match
# CONTAMINATION_MODEL_FEATURES in src/core/contamination_scoring.py.
# Phase 2 adds the last five per-contig purity features.
features:
  - contamination_score_v1
  - contamination_cellular_signal_v1
  - contamination_phage_signal_v1
  - contamination_duplication_signal_v1
  - contamination_viral_mixture_signal_v1
  - contamination_nonviral_hit_fraction_v1
  - order_dup
  - gvog8_dup
  - cellular_unique
  - cellular_total
  - phage_unique
  - phage_total
  - contigs
  - suspicious_bp_fraction_v2
  - suspicious_contig_count_v2
  - estimated_completeness
  - cellular_coherent_contig_count
  - cellular_coherent_protein_fraction
  - cellular_lineage_purity_median
  - cellular_hit_identity_median
  - viral_bearing_contig_count

# --- Notes -----------------------------------------------------------------
notes: >-
  Trained on features generated with sensitive_mode=true (E=1e-5,
  GA/TC/NC cutoffs disabled) and the v1.4.3 Phase 2 per-contig
  taxonomic-purity classifier active. Safe to apply under both
  sensitive and non-sensitive runs. The classifier distinguishes
  genuine host-contig contamination (coherent cellular lineage on a
  contig with no viral markers and high-identity cellular BLAST hits)
  from HGT-acquired eukaryote-like genes in novel giant viruses,
  which previously confounded the bin-level mixed_viral signal. See
  docs/quality_metrics.md for the full methodology.
