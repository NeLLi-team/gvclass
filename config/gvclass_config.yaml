# GVClass Configuration File
# Command line arguments will override these settings

# Database configuration
database:
  # Path to GVClass database (relative paths resolve from the GVClass repo)
  # If not found, will be downloaded automatically
  path: resources
  # Optional materialization cache for compact Parquet resources. When unset,
  # GVClass uses <database.path>/.gvclass_cache; GVCLASS_RESOURCE_CACHE overrides
  # this key. Relative paths resolve inside the selected database directory.
  cache_path:
  # Release asset used for first-time setup. gvclass-dev points at the
  # v2.0.0 alpha-test resources served over the Cloudflare tunnel.
  # Main/release uses the Zenodo asset.
  download_url: https://dl.newlineages.com/gvclass/resources_v2_0_0.tar.gz
  download_version: v2.0.0
  download_sha256: 2d238fbccef3e37fdf6cae0cd5dd24157cc5a57ed81af24c1edfbe42e4dd92f5
  # Expected size for validation (in MB)
  expected_size: 1497

# Pipeline settings
pipeline:
  # Tree building method: veryfasttree (default, fast) or iqtree (slower, more accurate)
  tree_method: veryfasttree
  # Species-tree IQ-TREE search: 'fast' (--fast, default) or 'ufboot' (ultrafast
  # bootstrap -B 1000 -bnni; slower, writes a .contree). Per-marker trees stay --fast.
  iqtree_mode: fast
  # Fast mode - skip order-level marker trees when True
  mode_fast: true
  # Completeness estimate to surface in the summary tables
  completeness_mode: novelty-aware
  # Sensitive mode - enabled by default, uses E-value 1e-5 instead of GA cutoffs
  sensitive_mode: true
  # Minimum contig length (bp) used in --contigs mode when splitting files
  contigs_min_length: 10000
  # Number of threads for computation
  threads: 4
  # Output directory pattern
  # Variables: {query_dir} = basename of query directory
  output_pattern: "{query_dir}_results"

# Genetic code settings
genetic_codes:
  # List of genetic codes to test
  codes: [0, 1, 4, 6, 11, 15, 29, 106, 129]
  # Minimum improvement threshold for selecting alternative genetic codes
  improvement_threshold: 0.05  # 5%

# Quality thresholds
quality:
  # Minimum number of markers required
  min_markers: 3
  # Minimum contig length (bp)
  min_length: 20000
  # Recommended minimum length (bp)
  recommended_length: 50000

# Resource allocation
resources:
  # Memory limit per worker (GB)
  memory_limit: 8
  # Timeout for individual tasks (minutes)
  task_timeout: 60

# Logging
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: ERROR
  # Keep intermediate files
  keep_temp: false
