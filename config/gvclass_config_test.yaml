# GVClass Test Configuration File
# Example configuration for testing with fewer resources

# Database configuration
database:
  path: resources
  # gvclass-dev alpha-test resources (v1.7.0) via the Cloudflare tunnel.
  download_url: https://dl.newlineages.com/gvclass/resources_v1_7_0.tar.gz
  download_version: v1.7.0
  download_sha256: 4827ce937e2071f321f6ab0b130d681af5f4fd73099c962133cc5220f1a3a786
  expected_size: 1752

# Pipeline settings - optimized for testing
pipeline:
  # Use fasttree for speed
  tree_method: fasttree
  # Enable fast mode for testing
  mode_fast: true
  # Match the production default: sensitive pyhmmer filtering is enabled
  sensitive_mode: true
  # Surface the tuned novelty-aware completeness estimate by default
  completeness_mode: novelty-aware
  # Minimum contig length (bp) used in --contigs mode when splitting files
  contigs_min_length: 10000
  # Reduced threads for testing
  threads: 4
  # Test output pattern
  output_pattern: "test_{query_dir}_results"

# Genetic code settings
genetic_codes:
  # Test fewer codes for speed
  codes: [0, 1, 4]
  improvement_threshold: 0.05

# Quality thresholds - relaxed for testing
quality:
  min_markers: 2
  min_length: 10000
  recommended_length: 20000

# Resource allocation - reduced for testing
resources:
  memory_limit: 4
  task_timeout: 30

# Logging - verbose for testing
logging:
  level: INFO
  keep_temp: true
