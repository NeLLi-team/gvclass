# GVClass Test Configuration File
# Example configuration for testing with fewer resources

# Database configuration
database:
  path: resources
  # Optional compact-resource cache. When unset, GVClass uses
  # <database.path>/.gvclass_cache; GVCLASS_RESOURCE_CACHE overrides this key.
  cache_path:
  # Release resources (v2.0.0) on Zenodo.
  download_url: https://zenodo.org/records/21225457/files/resources_v2_0_0.tar.gz?download=1
  download_version: v2.0.0
  download_sha256: df1c3a9d15a90307775f42f57e2a7c89436ed523883025f6fc94013035f5e066
  expected_size: 1497

# Pipeline settings - optimized for testing
pipeline:
  tree_method: veryfasttree
  iqtree_mode: fast   # 'fast' (--fast) or 'ufboot' (ultrafast bootstrap; species tree only)
  # Enable fast mode for testing
  mode_fast: true
  # Match the production default: sensitive pyhmmer filtering is enabled
  sensitive_mode: true
  # Surface the tuned novelty-aware completeness estimate by default
  completeness_mode: novelty-aware
  # Minimum contig length (bp) used in --contigs mode when splitting files.
  # Override per run with --contigs-min-length.
  contigs_min_length: 10000
  # Reduced threads for testing
  threads: 4
  # Test output pattern
  output_pattern: "test_{query_dir}_results"

# Genetic code settings
genetic_codes:
  # Test fewer codes for speed
  codes: [0, 1, 4]
  improvement_threshold: 0.05

# Quality thresholds - relaxed for testing
quality:
  min_markers: 2
  # Minimum total nucleotide length (bp) for each input FNA in bin/MAG mode.
  # Override per run with --min-length.
  min_length: 10000
  recommended_length: 20000

# Resource allocation - reduced for testing
resources:
  memory_limit: 4
  task_timeout: 30

# Logging - verbose for testing
logging:
  level: INFO
  keep_temp: true
