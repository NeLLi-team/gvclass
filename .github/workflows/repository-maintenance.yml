name: Repository Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

permissions:
  contents: read

jobs:
  stale-branch-report:
    name: Stale branch report
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report remote branches behind main
        shell: bash
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          {
            echo "## Remote Branch Status"
            echo
            echo "| Branch | Ahead of main | Behind main | Latest commit |"
            echo "|---|---:|---:|---|"
            for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin | grep -v '^origin/HEAD$'); do
              ahead=$(git rev-list --count origin/main.."$branch")
              behind=$(git rev-list --count "$branch"..origin/main)
              commit=$(git show -s --format='%h %cs %s' "$branch")
              printf '| `%s` | %s | %s | %s |\n' "$branch" "$ahead" "$behind" "$commit"
              if [ "$behind" -gt 0 ]; then
                echo "::warning title=Branch behind main::$branch is $behind commits behind origin/main"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"
