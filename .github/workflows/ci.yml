name: CI

on:
  push:
    branches: [main, "v*"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, type-check, and unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: v0.39.0
          cache: true

      - name: Lint (flake8)
        run: pixi run lint

      - name: Type-check (mypy)
        run: pixi run type-check

      - name: Unit tests (pytest)
        run: pixi run test

  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: v0.39.0
          cache: true

      - name: Run public repo hygiene checks
        run: pixi run pytest tests/test_repo_hygiene.py -q

  golden-file:
    name: Golden-file regression on example/
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: v0.39.0
          cache: true

      - name: Read expected DB download metadata
        id: dbhash
        run: |
          python - <<'PY' >> $GITHUB_OUTPUT
          import re, pathlib
          txt = pathlib.Path("config/gvclass_config.yaml").read_text()
          sha = re.search(r"^\s*download_sha256:\s*([0-9a-f]+)\s*$", txt, re.M)
          version = re.search(r"^\s*download_version:\s*(\S+)\s*$", txt, re.M)
          print(f"sha256={sha.group(1) if sha else 'unknown'}")
          print(f"version={version.group(1) if version else 'unknown'}")
          PY

      - name: Cache GVClass resources tarball and extracted DB
        uses: actions/cache@v4
        with:
          path: |
            resources
          key: gvclass-db-${{ steps.dbhash.outputs.sha256 }}

      - name: Install pixi environment and download DB if not cached
        run: |
          pixi install
          installed_version="$(cat resources/DB_VERSION 2>/dev/null || true)"
          if [ ! -f resources/hmm/combined.hmm ] || [ "${installed_version}" != "${{ steps.dbhash.outputs.version }}" ]; then
            pixi run setup-db
          fi

      - name: Run golden-fixture regression test
        env:
          GVCLASS_RUN_GOLDEN: "1"
        run: |
          # tests/test_golden_example_summary.py runs `pixi run gvclass example`
          # with --mode-fast --plain-output, then projects the STABLE_COLUMNS
          # subset and diffs against tests/fixtures/expected_example_summary.tsv.
          # Keeps the test harness and the CI gate on exactly the same code
          # path.
          pixi run pytest tests/test_golden_example_summary.py -v

  container-build:
    name: Build Apptainer SIF and smoke-test
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      # Mapped from the repo secret so the publish step can self-skip when it
      # is absent (forks / unconfigured repos) and the build still succeeds.
      SYLABS_TOKEN: ${{ secrets.SYLABS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Build SIF
        run: apptainer build gvclass.sif containers/apptainer/gvclass.def

      - name: Smoke-test SIF (bare gvclass command, as Snakemake invokes it)
        run: |
          # Exercise the bare `gvclass` command via PATH + the
          # /usr/local/bin/gvclass symlink and non-root exec permissions —
          # the way workflow engines (Snakemake/Nextflow) call it — rather
          # than the absolute /opt/gvclass/gvclass path. This way a regression
          # of the container command-publishing fix fails CI.
          apptainer exec gvclass.sif gvclass --version
          resolved="$(apptainer exec gvclass.sif sh -c 'command -v gvclass')"
          echo "gvclass resolves to: ${resolved}"
          test "${resolved}" = "/usr/local/bin/gvclass"
          apptainer exec gvclass.sif sh -c 'test "$GVCLASS_RESOURCE_CACHE" = "/resource-cache"'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: gvclass.sbom.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gvclass-container-${{ github.ref_name }}
          path: |
            gvclass.sif
            gvclass.sbom.json

      # Mirror release SIFs to the Sylabs library. The `gvclass-a` wrapper pulls
      # the versioned library:// URI by default.
      - name: Publish SIF to Sylabs library
        if: ${{ env.SYLABS_TOKEN != '' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          apptainer remote add --no-login SylabsCloud cloud.sylabs.io 2>/dev/null || true
          apptainer remote use SylabsCloud
          umask 077
          token_file="${RUNNER_TEMP}/sylabs.token"
          printf '%s' "${SYLABS_TOKEN}" > "${token_file}"
          apptainer remote login --tokenfile "${token_file}" SylabsCloud
          rm -f "${token_file}"
          apptainer push -U --library https://library.sylabs.io gvclass.sif \
            "library://nelligroup-jgi/gvclass/gvclass:${version}"
          # Re-tag release images as :latest so consumers can pull
          # library://nelligroup-jgi/gvclass/gvclass without pinning a version.
          # The library is content-addressed, so this reuses the blob just
          # uploaded and completes near-instantly.
          apptainer push -U --library https://library.sylabs.io gvclass.sif \
            "library://nelligroup-jgi/gvclass/gvclass:latest"
          echo "Published library://nelligroup-jgi/gvclass/gvclass:${version} and :latest"
